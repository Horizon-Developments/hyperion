name: Bundle Cryptography

on:
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Clone rbx-cryptography
        run: git clone --depth 1 https://github.com/daily3014/rbx-cryptography.git vendor

      - name: Install darklua
        run: |
          curl -L -o darklua.zip https://github.com/seaofvoices/darklua/releases/latest/download/darklua-linux-x86_64.zip
          unzip -o darklua.zip -d darklua-bin
          sudo mv darklua-bin/darklua /usr/local/bin/darklua

      - name: Build entry point and bundle
        run: |
          cat > darklua.json << 'EOF'
          {
            "bundle": {
              "require_mode": "luau"
            },
            "generator": {
              "name": "dense",
              "column_span": 1000000
            },
            "rules": [
              "remove_comments",
              "remove_types",
              "remove_method_definition",
              "remove_method_call",
              "remove_spaces",
              {
                "rule": "rename_variables",
                "globals": [
                  "$default",
                  "$roblox"
                ],
                "include_functions": true
              }
            ]
          }
          EOF
          mkdir -p build dist
          AEAD=$(realpath --relative-to=build vendor/src/Encryption/AEAD/init.luau)
          SHA3=$(realpath --relative-to=build vendor/src/Hashing/SHA3.luau)
          B64=$(realpath --relative-to=build vendor/src/Utilities/Base64.luau)
          printf 'return {\n\t["ChaCha20_Poly1305"] = require("%s"),\n\t["sha3_256"] = require("%s").SHA3_256,\n\t["base64"] = require("%s"),\n}\n' "$AEAD" "$SHA3" "$B64" > build/entry.luau
          darklua process build/entry.luau dist/Hyperion.luau --config darklua.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundled-crypto
          path: dist/Hyperion.luau