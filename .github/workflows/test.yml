name: Bundle Fiu

on:
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Download Fiu source
        run: |
          curl -L https://raw.githubusercontent.com/rce-incorporated/Fiu/main/Source.lua -o Source.lua

      - name: Install darklua
        run: |
          curl -L https://github.com/seaofvoices/darklua/releases/download/v0.18.0/darklua-linux-x86_64.zip -o darklua.zip
          unzip -q darklua.zip
          chmod +x darklua
          sudo mv darklua /usr/local/bin/darklua

      - name: Write darklua config
        run: |
          cat > .darklua.json << 'EOF'
          {
            "generator": {
              "name": "dense",
              "column_span": 100000
            },
            "rules": [
              "remove_comments",
              "remove_types",
              "remove_method_definition",
              "remove_method_call",
              "remove_spaces",
              {
                "rule": "rename_variables",
                "globals": [
                  "$default",
                  "$roblox"
                ],
                "include_functions": true
              }
            ]
          }
          EOF

      - name: Minify
        run: |
          darklua process Source.lua bundle.luau --config .darklua.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fiu-bundle
          path: bundle.luau