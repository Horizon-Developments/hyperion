name: Bundle Cryptography

on:
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rbx-cryptography
        uses: actions/checkout@v4
        with:
          repository: daily3014/rbx-cryptography

      - name: Install darklua
        run: |
          curl -L https://github.com/seaofvoices/darklua/releases/download/v0.18.0/darklua-linux-x86_64.zip -o darklua.zip
          unzip -q darklua.zip
          chmod +x darklua
          sudo mv darklua /usr/local/bin/darklua

      - name: Install Rojo
        run: |
          curl -L https://github.com/rojo-rbx/rojo/releases/download/v7.4.4/rojo-7.4.4-linux-x86_64.zip -o rojo.zip
          unzip -q rojo.zip
          chmod +x rojo
          sudo mv rojo /usr/local/bin/rojo

      - name: Generate sourcemap
        run: rojo sourcemap default.project.json -o sourcemap.json
      - name: Write darklua config
        run: |
          cat > .darklua.json << 'EOF'
          {
            "generator": {
              "name": "dense"
            },
            "bundle": {
              "require_mode": {
                "name": "path",
                "rojo_sourcemap": "sourcemap.json"
              }
            },
            "rules": [
              "remove_comments"
            ]
          }
          EOF 
      - name: Bundle
        run: |
          darklua process src/init.luau bundle.luau --config .darklua.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptography-bundle
          path: bundle.luau