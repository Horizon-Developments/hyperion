name: Bundle Cryptography

on:
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rbx-cryptography
        uses: actions/checkout@v4
        with:
          repository: daily3014/rbx-cryptography

      - name: Install darklua
        run: |
          curl -L https://github.com/seaofvoices/darklua/releases/download/v0.18.0/darklua-linux-x86_64.zip -o darklua.zip
          unzip -q darklua.zip
          chmod +x darklua
          sudo mv darklua /usr/local/bin/darklua

      - name: Write darklua config
        run: |
          cat > .darklua.json << 'EOF'
          {
            "generator": {
              "name": "dense",
              "column_span": 100000
            },
            "bundle": {
              "require_mode": {
                "name": "luau"
              }
            },
            "rules": [
              "remove_comments",
              "remove_types",
              "remove_method_definition",
              "remove_method_call",
              "remove_spaces",
              {
                "rule": "rename_variables",
                "globals": [
                  "$default",
                  "$roblox"
                ],
                "include_functions": true
              }
            ]
          }
          EOF
      - name: Write entry point
        run: |
          cat > src/entry.luau << 'EOF'
          local AEAD = require("@self/Encryption/AEAD")
          local SHA3 = require("@self/Hashing/SHA3")
      
          return {
              ["ChaCha20Poly1305"] = AEAD,
              ["SHA3_256"] = SHA35.SHA3_256,
          }
          EOF
      - name: Bundle
        run: |
          darklua process src/entry.luau bundle.luau --config .darklua.json
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptography-bundle
          path: bundle.luau