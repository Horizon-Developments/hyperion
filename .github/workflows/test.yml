name: Bundle Cryptography

on:
  workflow_dispatch:

env:
  DARKLUA_VERSION: v0.18.0
  ROJO_VERSION: v7.4.4

jobs:
  bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rbx-cryptography
        uses: actions/checkout@v4
        with:
          repository: daily3014/rbx-cryptography

      - name: Install tools
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.local/bin"

          curl -Ls "https://github.com/seaofvoices/darklua/releases/download/${DARKLUA_VERSION}/darklua-linux-x86_64.zip" -o darklua.zip
          unzip -q darklua.zip
          chmod +x darklua
          mv darklua "$HOME/.local/bin"

          curl -Ls "https://github.com/rojo-rbx/rojo/releases/download/${ROJO_VERSION}/rojo-linux-x86_64.zip" -o rojo.zip
          unzip -q rojo.zip
          chmod +x rojo
          mv rojo "$HOME/.local/bin"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Generate sourcemap
        run: rojo sourcemap default.project.json -o sourcemap.json

      - name: Write darklua config
        run: |
          cat > .darklua.json << 'EOF'
          {
            "generator": {
              "name": "dense"
            },
            "rules": [
              {
                "rule": "bundle_require",
                "require_mode": {
                  "name": "roblox",
                  "rojo_sourcemap": "sourcemap.json"
                }
              },
              {
                "rule": "remove_comments"
              }
            ]
          }
          EOF

      - name: Bundle
        run: darklua bundle --config .darklua.json src/init.luau bundle.luau

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptography-bundle
          path: bundle.luau
          compression-level: 9